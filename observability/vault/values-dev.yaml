injector:
  enabled: false

server:
  dev:
    enabled: true
    devRootToken: root #Minikube dev mode

  service:
    enabled: true
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - host: vault.grandlabs.com
        paths:
          - /
    tls:
      - secretName: vault-grandlabs-com-tls
        hosts:
          - vault.grandlabs.com

ui:
  enabled: true
